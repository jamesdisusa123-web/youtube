<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader - Fast & Free</title>
  <style>
    :root {
      --primary: #ff0000;
      --primary-dark: #cc0000;
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --text: #ffffff;
      --text-dim: #aaaaaa;
      --input-bg: #252525;
      --border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      margin-top: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .logo h1 span { color: var(--primary); }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border: 1px solid var(--border);
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    input[type="text"], select {
      width: 100%;
      padding: 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--primary);
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: var(--input-bg);
      border-radius: 10px;
      display: none;
    }
    .result.show { display: block; }
    .result a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .disclaimer {
      margin-top: 30px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
      .logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🎬 <span>YT</span>Downloader</h1>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="url">Paste YouTube URL</label>
        <input type="text" id="url" placeholder="https://youtube.com/watch?v=..." />
      </div>

      <div class="options">
        <div class="input-group">
          <label for="format">Format</label>
          <select id="format">
            <option value="mp4">MP4 (Video)</option>
            <option value="mp3">MP3 (Audio)</option>
          </select>
        </div>
        <div class="input-group">
          <label for="quality">Quality</label>
          <select id="quality">
            <option value="best">Best Available</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="320kbps">320 kbps (MP3)</option>
            <option value="128kbps">128 kbps (MP3)</option>
          </select>
        </div>
      </div>

      <button class="btn" id="convertBtn" onclick="startDownload()">
        <span class="loader" id="loader"></span>
        <span id="btnText">🚀 Convert & Download</span>
      </button>

      <div class="result" id="result">
        <p id="resultText">✅ Ready! <a href="#" id="downloadLink" target="_blank">Click here to download</a></p>
      </div>
    </div>

    <p class="disclaimer">
      ⚠️ For personal use only. Respect copyright laws and YouTube's Terms of Service. 
      Only download content you have rights to.
    </p>
  </div>

  <script>
    // ⚠️ THIS IS A FRONTEND-ONLY DEMO
    // Real downloading requires a backend API (see instructions below)

    async function startDownload() {
      const url = document.getElementById('url').value.trim();
      const format = document.getElementById('format').value;
      const quality = document.getElementById('quality').value;
      const btn = document.getElementById('convertBtn');
      const loader = document.getElementById('loader');
      const btnText = document.getElementById('btnText');
      const result = document.getElementById('result');
      const resultText = document.getElementById('resultText');
      const downloadLink = document.getElementById('downloadLink');

      // Basic validation
      if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
        alert('⚠️ Please enter a valid YouTube URL');
        return;
      }

      // UI: Loading state
      btn.disabled = true;
      loader.style.display = 'inline-block';
      btnText.textContent = 'Processing...';
      result.classList.remove('show');

      try {
        // 🔧 OPTION 1: Connect to YOUR backend API (replace URL)
        // const response = await fetch('https://your-backend.com/api/download', {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ url, format, quality })
        // });
        // const data = await response.json();
        // downloadLink.href = data.downloadUrl;

        // 🔧 OPTION 2: Demo mode (shows how it would work)
        await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate processing
        
        // Demo result (NOT a real download - just for UI testing)
        const demoUrl = `https://example.com/demo-${format}-${quality}.file`;
        downloadLink.href = demoUrl;
        resultText.innerHTML = `✅ <strong>Demo Mode</strong><br>Backend not connected.<br><a href="${demoUrl}" style="color:#ff4444">See how download link would appear</a>`;
        
        result.classList.add('show');
      } catch (error) {
        alert('❌ Error: ' + error.message);
        resultText.textContent = '❌ Failed to process. Please try again.';
        result.classList.add('show');
      } finally {
        // UI: Reset state
        btn.disabled = false;
        loader.style.display = 'none';
        btnText.textContent = '🚀 Convert & Download';
      }
    }

    // Allow Enter key to trigger download
    document.getElementById('url').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startDownload();
    });
  </script>
</body>
</html>
