<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 YT Downloader - Fast & Free</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
</head>
<body>
  <div class="container">
    <header class="logo">
      <h1>🎬 <span class="highlight">YT</span>Downloader</h1>
      <p class="subtitle">Download YouTube videos & audio — Fast, Free, No Signup</p>
    </header>

    <main class="card">
      <div class="input-group">
        <label for="url">🔗 Paste YouTube URL</label>
        <div class="input-wrapper">
          <input type="text" id="url" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
          <div class="input-actions">
            <button type="button" class="action-btn" id="pasteBtn" title="Paste">📋</button>
            <button type="button" class="action-btn" id="clearBtn" title="Clear">✕</button>
          </div>
        </div>
      </div>

      <div class="options-grid">
        <div class="input-group">
          <label for="format">📦 Format</label>
          <select id="format">
            <option value="mp4">🎥 MP4 (Video)</option>
            <option value="mp3">🎵 MP3 (Audio)</option>
          </select>
        </div>
        <div class="input-group">
          <label for="quality">⚙️ Quality</label>
          <select id="quality">
            <option value="best">✨ Best Available</option>
            <option value="1080">📺 1080p</option>
            <option value="720">📺 720p</option>
            <option value="480">📱 480p</option>
          </select>
        </div>
      </div>

      <button class="btn-secondary" id="fetchInfoBtn">🔍 Fetch Video Info</button>
      <button class="btn-primary" id="downloadBtn">🚀 Convert & Download</button>

      <div class="result-box" id="resultBox">
        <div class="result-header">
          <span id="resultStatus">⏳ Processing...</span>
          <button id="closeResult">✕</button>
        </div>
        <div class="result-content" id="resultContent"></div>
      </div>

      <div class="preview-section" id="previewSection" style="display:none;">
        <h3>📹 Video Preview</h3>
        <div class="video-container">
          <video id="videoPlayer" controls width="100%" poster=""></video>
        </div>
        <div class="video-info" id="videoInfo">
          <h4 id="videoTitle">Loading...</h4>
          <p id="videoMeta">Duration: -- • Size: --</p>
        </div>
      </div>
    </main>

    <footer class="disclaimer">
      <p>⚠️ <strong>Personal Use Only.</strong> Respect copyright & YouTube Terms of Service.</p>
      <p class="version">v1.0 • Hosted on GitHub Pages</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
